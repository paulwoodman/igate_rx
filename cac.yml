# Since Ansible 2.12 (core):
# To generate an example config file (a "disabled" one with all default settings, commented out):
#               $ ansible-config init --disabled > ansible.cfg
#
# Also you can now have a more complete file by including existing plugins:
# ansible-config init --disabled -t all > ansible.cfg

# For previous versions of Ansible you can check for examples in the 'stable' branches of each version
# Note that this file was always incomplete  and lagging changes to configuration settings

# for example, for 2.9: https://github.com/ansible/ansible/blob/stable-2.9/examples/ansible.cfg

## Custom Config
[galaxy]
# server_list = rh-certified_repo,validated_pah,community_repo
server_list = automationhub,validated_ah,galaxy

[galaxy_server.galaxy]
url=https://galaxy.ansible.com/

[galaxy_server.automationhub]
url=https://console.redhat.com/api/automation-hub/
auth_url=https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
token=

[galaxy_server.validated_ah]
url=https://console.redhat.com/api/automation-hub/content/validated/
auth_url=https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
token=

[galaxy_server.community_repo]
url=https://aap26.client.example.com/api/galaxy/content/community/
token=

[galaxy_server.rh-certified_repo]
url=https://aap26.client.example.com/api/galaxy/content/rh-certified/
token=

[galaxy_server.validated_pah]
url=https://aap26.client.example.com/api/galaxy/content/validated/
token=
